version: '3.9'
services:
  mongo:
    image: mongo:7
    container_name: invoice-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: invoice-dashboard
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: invoice-backend
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://mongo:27017/invoice-dashboard
      PORT: 5000
      NODE_ENV: production
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: invoice-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo-data:
